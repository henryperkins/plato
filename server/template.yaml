AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: plato — API server, auth, data sync, AI proxy

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - playground
    Description: Deployment stage (prod or playground)

Conditions:
  IsProd: !Equals [!Ref Stage, prod]

Globals:
  Function:
    Timeout: 60
    Runtime: nodejs20.x
    MemorySize: 1024
    Tags:
      Application: plato
      Project: ai-leaders

Resources:
  # API Gateway function — serves the admin dashboard and non-streaming API
  PlatoApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Timeout: 120
      Handler: src/index.handler
      CodeUri: .
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          INVITES_TABLE: !Ref InvitesTable
          REFRESH_TOKENS_TABLE: !Ref RefreshTokensTable
          SYNC_DATA_TABLE: !Ref SyncDataTable
          AUDIT_LOG_TABLE: !Ref AuditLogTable
          STAGE: !Ref Stage
          JWT_SECRET: !Sub '{{resolve:ssm:/plato/${Stage}/jwt-secret}}'
          ADMIN_EMAIL: !Sub '{{resolve:ssm:/plato/${Stage}/admin-email}}'
          ADMIN_PASSWORD: !Sub '{{resolve:ssm:/plato/${Stage}/admin-password}}'
          SES_FROM_EMAIL: !Sub '{{resolve:ssm:/plato/${Stage}/ses-from-email}}'
          APP_URL: !Sub '{{resolve:ssm:/plato/${Stage}/app-url}}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InvitesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RefreshTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SyncDataTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - Statement:
            - Effect: Allow
              Action: ses:SendEmail
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
        - Statement:
            # FilterLogEvents supports per-group resource scoping.
            - Effect: Allow
              Action: logs:FilterLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-*"
            # DescribeLogGroups lists groups — AWS requires Resource: * for
            # this action even when the caller only wants to see a subset.
            # The caller applies a logGroupNamePrefix filter, so we only see
            # plato log groups in practice.
            - Effect: Allow
              Action: logs:DescribeLogGroups
              Resource: "*"
        - Statement:
            # Self-invoke for stale-while-revalidate dashboard stats refresh.
            # Scoped to functions in this stack (the SAM-generated function
            # name starts with the stack name). A circular self-reference
            # via !GetAtt would also work but breaks stack creation order;
            # the stack-name prefix avoids the dependency.
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*"
      Events:
        ApiCatchAll:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY

  # Function URL — supports response streaming for SSE
  PlatoStreamFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/index.streamHandler
      CodeUri: .
      Environment:
        Variables:
          USERS_TABLE: !Ref UsersTable
          INVITES_TABLE: !Ref InvitesTable
          REFRESH_TOKENS_TABLE: !Ref RefreshTokensTable
          SYNC_DATA_TABLE: !Ref SyncDataTable
          AUDIT_LOG_TABLE: !Ref AuditLogTable
          STAGE: !Ref Stage
          JWT_SECRET: !Sub '{{resolve:ssm:/plato/${Stage}/jwt-secret}}'
          ADMIN_EMAIL: !Sub '{{resolve:ssm:/plato/${Stage}/admin-email}}'
          ADMIN_PASSWORD: !Sub '{{resolve:ssm:/plato/${Stage}/admin-password}}'
          SES_FROM_EMAIL: !Sub '{{resolve:ssm:/plato/${Stage}/ses-from-email}}'
          APP_URL: !Sub '{{resolve:ssm:/plato/${Stage}/app-url}}'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InvitesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RefreshTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref SyncDataTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AuditLogTable
        - Statement:
            - Effect: Allow
              Action: ses:SendEmail
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:InvokeModelWithResponseStream
              Resource: '*'
        - Statement:
            # FilterLogEvents supports per-group resource scoping.
            - Effect: Allow
              Action: logs:FilterLogEvents
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AWS::StackName}-*"
            # DescribeLogGroups lists groups — AWS requires Resource: * for
            # this action even when the caller only wants to see a subset.
            # The caller applies a logGroupNamePrefix filter, so we only see
            # plato log groups in practice.
            - Effect: Allow
              Action: logs:DescribeLogGroups
              Resource: "*"
      FunctionUrlConfig:
        AuthType: NONE
        InvokeMode: RESPONSE_STREAM

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, plato-users, !Sub 'plato-${Stage}-users']
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Application
          Value: plato
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: username-index
          KeySchema:
            - AttributeName: username
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  InvitesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, plato-invites, !Sub 'plato-${Stage}-invites']
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Application
          Value: plato
      AttributeDefinitions:
        - AttributeName: inviteToken
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: inviteToken
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  RefreshTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, plato-refresh-tokens, !Sub 'plato-${Stage}-refresh-tokens']
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Application
          Value: plato
      AttributeDefinitions:
        - AttributeName: tokenHash
          AttributeType: S
      KeySchema:
        - AttributeName: tokenHash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  SyncDataTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, plato-sync-data, !Sub 'plato-${Stage}-sync-data']
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Application
          Value: plato
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: dataKey
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: dataKey
          KeyType: RANGE

  AuditLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !If [IsProd, plato-audit-log, !Sub 'plato-${Stage}-audit-log']
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Application
          Value: plato
      AttributeDefinitions:
        - AttributeName: logId
          AttributeType: S
      KeySchema:
        - AttributeName: logId
          KeyType: HASH

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  StreamingUrl:
    Description: Lambda Function URL (response streaming)
    Value: !GetAtt PlatoStreamFunctionUrl.FunctionUrl
