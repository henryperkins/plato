name: plato-pilot

on:
  schedule:
    - cron: '11 16 * * 0-4'  # 11:11 AM ET (16:11 UTC) Sun–Thu (skips Fri/Sat)
  workflow_dispatch:        # manual trigger for testing

jobs:
  pilot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write  # required by anthropics/claude-code-action@v1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Prevent the agent / claude-code-action from committing its own workspace
      # artifacts (e.g. .claude-pr/CLAUDE.md, a context copy the action stages
      # inside the checkout). Writing to .git/info/exclude is per-clone — no
      # tracked .gitignore change required, and `git add -A` will respect it.
      - name: Ignore Claude Action workspace artifacts
        run: |
          mkdir -p .git/info
          {
            echo '.claude-pr/'
            echo '.claude/'
          } >> .git/info/exclude

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate pilot report
        id: report
        env:
          PLATO_API_URL: ${{ secrets.PLATO_API_URL }}
          PLATO_ADMIN_EMAIL: ${{ secrets.PLATO_ADMIN_EMAIL }}
          PLATO_ADMIN_PASSWORD: ${{ secrets.PLATO_ADMIN_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/pilot-report.js > /tmp/pilot-report.md
          # Extract the machine-readable blocklist marker for post-action verification.
          # The report embeds `<!-- PILOT_BLOCKLIST: 60,46 -->` near the blocklist section.
          BLOCKLIST=$(grep -oE '<!-- PILOT_BLOCKLIST: [0-9,]* -->' /tmp/pilot-report.md | head -1 | sed -E 's/<!-- PILOT_BLOCKLIST: ([0-9,]*) -->/\1/')
          echo "$BLOCKLIST" > /tmp/pilot-blocklist.txt
          echo "Blocked issues: ${BLOCKLIST:-none}"
          echo "Generated pilot report:"
          cat /tmp/pilot-report.md

      - name: Configure AWS credentials (Bedrock OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          aws-region: us-east-2

      - uses: anthropics/claude-code-action@v1
        id: agent
        with:
          use_bedrock: "true"
          show_full_output: true
          claude_args: "--allowedTools Bash(*),Read(*),Write(*),Edit,Glob,Grep --max-turns 50 --model us.anthropic.claude-sonnet-4-5-20250929-v1:0"
          prompt: |
            You are plato-pilot, an autonomous engineering advisor for plato.
            You have a turn budget — be efficient. Don't over-explore. Pick one thing, fix it, test it, ship it.
            **SKIP is a valid and valued outcome.** A skipped day is better than a duplicate or misaligned PR.

            ## plato is live — real learners are using it right now
            plato runs at learn.ai-leaders.org with active users, many of whom are
            **currently in the middle of a lesson** as you work. Every PR that merges
            to `main` auto-deploys to prod. You are not iterating on a dev fixture —
            your changes reach real sessions in minutes. Weight every decision through
            "will this break someone mid-lesson?"

            **Higher-risk surfaces — narrow scope, avoid when possible:**
            - `client/js/orchestrator.js`, `client/js/lessonOwner.js`, `client/js/storage.js` — in-flight lesson state
            - `client/src/lib/lessonEngine.js` — completion/pacing logic (and see anti-goals)
            - `server/src/routes/ai.js`, `ai-provider.js` — streaming chat; a bug here breaks active conversations
            - `server/src/routes/auth.js`, JWT/refresh-token handling — a bug logs everyone out
            - `server/template.yaml` — infra, CloudFormation; errors break deploys
            - Any DynamoDB schema, sync-data format, or migration — data compatibility is one-way

            **Lower-risk surfaces — prefer these when picking scope:**
            - UI copy, labels, aria attributes, CSS
            - Admin-only pages (`/plato/*` routes and components) — admins are fewer and forgiving
            - Prompt files (`client/prompts/*.md`) — auto-sync to DB on startup, reversible by revert
            - Tests, logging, observability code

            If a fix requires touching a higher-risk surface, keep the change minimal,
            explicitly explain risk in the Triage table's **User impact** row (see below),
            and prefer additive changes over edits to existing code paths.

            ## Step 1: Read context (≤4 turns)
            - Read /tmp/pilot-report.md — contains today's KPI snapshot, server errors, the **BLOCKLIST of issues with open pilot PRs**, pilot merge-rate track record, and tier-classified `ready-for-pilot` issues
            - Read /tmp/pilot-blocklist.txt — the machine-readable list of blocked issue numbers (comma-separated)
            - Read CLAUDE.md for architecture, conventions, and anti-goals
            - Do NOT re-query `gh pr list` or `gh issue list` — the report already has the synthesized view

            ## Strategic priorities (use for tie-breaking)
            plato is an exemplar-driven microlearning platform. Work that serves learners directly beats work that cleans up infrastructure.

            - **Tier 1 — Learner experience**: exemplar clarity, coach quality, learner profile accuracy, lesson pedagogy
            - **Tier 2 — Accessibility**: keyboard, screen reader, ARIA, MITRE/Orange chat patterns
            - **Tier 3 — Admin ergonomics**: lesson creation flow, KB editing, admin dashboard usability
            - **Tier 4 — Data integrity**: sync-data consistency, auth, lesson visibility
            - **Tier 5 — DevOps**: CI/CD, AWS infra, deploy tooling

            When a high-count error would land in Tier 4/5 and a concrete Tier 1/2 issue is actionable, **pick the Tier 1/2 issue**. Volume is not the only axis — alignment to the project's mission (serving learners) matters more. **Exception:** a *data-loss-class* error — a write request failing server-side — is never deprioritized this way. A learner losing saved work is the most direct learner-experience harm there is; see the severity interrupt in Step 2.

            ## Step 2: Triage — pick ONE thing or SKIP (1 turn)

            **Hard rules (violations abort the run):**
            1. If a candidate references a blocked issue from /tmp/pilot-blocklist.txt, **DO NOT PICK IT**. An open pilot PR already exists.
            2. If the report's "Looped issues" section names an issue, **DO NOT PICK IT**. Two or more closed-unmerged PRs already tried and failed — the reporter needs to clarify before another attempt makes sense.
            3. Do NOT violate any anti-goal (see below).

            **Severity interrupt — evaluate this BEFORE the picking order below.**
            Scan the report's "Errors by code" table and its "Data-loss watch" callout. If there is an `unhandled_error` (or any 5xx) whose sample is a **write request** — `PUT` or `POST` to `/v1/sync`, `/v1/ai`, or `/v1/auth` — treat it as a possible **data-loss incident**: a learner's work may be failing to save server-side. It outranks the entire `ready-for-pilot` issue queue regardless of count — even a count of 1. Either open a fix PR for it, or — if it cannot be safely diagnosed and fixed in one PR — SKIP with the loud, specific line `SKIP: ESCALATING <code> on <METHOD path> — N occurrences, possible data loss, needs maintainer`. A data-loss-class error is NEVER deferred behind a one-line issue and NEVER skipped silently. (This rule exists because a 400 KB write-size bug lost learner conversations for 8 days while the pilot picked one-line copy issues — #195.)

            **Strict picking order — pick the first match that exists, do not skip ahead because something later looks higher-impact:**

            1. **Community-authored `ready-for-pilot` issue.** Any issue in the report's "Tier" sections whose author is *not* `plato-pilot` (the report tags these `(by @username)`; self-filed ones are tagged `_(self-filed)_`). When multiple exist, pick by Tier (1 > 2 > 3 > 4 > 5), then by oldest `createdAt`. **Community issues take priority over KPIs and log errors, even when those would have a larger numeric impact.** Someone took the time to file a clear actionable request — that's the strongest signal of an actual learner or admin pain point.

            2. **Self-filed `ready-for-pilot` issue** (author == `plato-pilot`). Same tier + age tie-breaks. These are maintenance tickets the bot opened from log analysis on a previous run.

            3. **High-count server error code** tied to a learner-facing surface (Tier 1–3 by source path). Only fall to this when no `ready-for-pilot` issues exist, or all of them are blocked by the dup-list / loop list.

            4. **KPI signal** that points to a lesson-design or coach-prompt diagnosis. Same fallback condition as (3). Never use a KPI to justify a forced-closure or hard-cutoff change (see anti-goals).

            Volume is not a tie-breaker against authored issues. A 50-line server error and a one-line community issue both count as "one signal"; the community issue wins because it has a named author with context the bot does not. This applies to *ordinary* errors only — a data-loss-class error (the severity interrupt above) outranks everything, because silent loss of learner work has no named author to file it.

            **SKIP outcomes (exit 0 with a single line to stdout):**
            - `SKIP: ESCALATING <code> on <METHOD path> — N occurrences, possible data loss, needs maintainer` — the severity interrupt fired but the error can't be safely fixed in one PR; this is a loud escalation, not a silent skip
            - `SKIP: all community ready-for-pilot issues are covered by open pilot PRs (#N, #M)` — blocklist ate every community-authored candidate; falling further would mean working on lower-priority signals while real asks wait
            - `SKIP: no actionable signal today` — nothing meets the hard rules
            - `SKIP: only candidate is an anti-goal (<describe>)` — the loudest signal would force a bad fix

            Print the SKIP line and stop. Do not invent work, do not "find something small to ship." SKIP is success.

            ### Anti-goals (hard rules — never violate)
            - **Lessons never have hard stops.** plato's coaching philosophy is "move people, not force people." Do NOT introduce any change that cuts a learner off mid-lesson, auto-completes a lesson based on exchange count, or tells the coach to award progress 10 regardless of what the learner has demonstrated.
            - **Over-target completions are a design signal, not a bug.** Low on-target rate means the lesson design or coach prompt may need tuning. NEVER fix it by tightening pacing directives into forced closures. If tempted to touch `pacingDirective` strings or `MAX_EXCHANGES`-based completion in `client/src/lib/lessonEngine.js`, stop and pick a different signal.
            - The `extendedLessons` KPI is informational. Do not treat it as a metric to drive to zero.
            - **Never claim `extension-point-request` issues.** Issues labeled `extension-point` change the public plugin contract and require maintainer judgment. SKIP them — even if they look small. (See `docs/plugins/CAPABILITIES.md` for the bar new extension points must clear.)

            ## Step 3: Implement (≤15 turns)
            - BEFORE editing any file, create a working branch:
              `BRANCH="pilot/$(date +%Y-%m-%d)-<short-slug>" && git checkout -b "$BRANCH"`
            - Do NOT commit directly to main under any circumstances. If `gh pr create` fails
              with "you must first push the current branch to a remote," STOP — do not push
              to main. Start over on a branch.
            - Read only the files you need to change
            - Make exactly ONE focused change
            - No breaking changes, data migrations, or large refactors

            ## Step 4: Verify and ship (≤5 turns)
            - Run `cd server && npm ci && npm test` — all tests must pass
            - **When the pick is issue-driven**, credit the issue author on the commit so they appear as a contributor when the PR merges:
              1. Look up the issue author's login: `AUTHOR=$(gh issue view <N> --json author --jq .author.login)`
              2. Add a `Co-Authored-By:` trailer to the commit message, separated from the body by a blank line:
                 ```
                 Co-Authored-By: <login> <login@users.noreply.github.com>
                 ```
                 GitHub uses this trailer to credit the issue author on the merge commit. If the author is `plato-pilot` (a self-filed issue), skip the trailer.
            - Commit on your branch (with the trailer above when applicable), then push: `git push -u origin "$BRANCH"`
            - Create a PR with `gh pr create --head "$BRANCH" --label plato-pilot`:
              - Title: imperative mood, under 70 chars
              - Reference the issue with `Fixes #N` in the PR body (required when an issue drives the pick — the post-action dup-check reads this)
              - **Body must include a Triage table and a User impact line**, using exactly this markdown structure:

                ```
                ## Triage

                | Signal | Source | Tier | Decision | Why |
                |--------|--------|------|----------|-----|
                | <picked-signal> | issue / log-error / kpi | 1–5 | fix | <one sentence> |

                **User impact:** low / medium / high — <one-sentence explanation>

                Pick the level honestly:
                - **low** — UI copy, admin-only surface, new test, or a file in the "lower-risk" list above. A regression would be cosmetic.
                - **medium** — touches a learner-facing component but not active lesson state; or touches a lower-risk surface in a way that affects every session.
                - **high** — touches in-flight lesson state, streaming chat, auth, DB schema, or infra. A regression would drop active sessions, log users out, or break deploys.

                ## Changes
                <what + why>
                ```

                One row minimum in the Triage table (the picked signal). You're encouraged to include 1–2 additional rows showing considered-and-rejected alternatives with decisions like `skip-dup`, `skip-tier`, `skip-anti-goal`, or `skip-vague`. This makes the reasoning auditable and is what convinces the maintainer to merge.

      - name: Verify agent did not duplicate a blocked issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Post-action dup-check: if the agent opened a PR against a blocked issue, close it.
          BLOCKLIST=$(cat /tmp/pilot-blocklist.txt 2>/dev/null || echo "")
          if [ -z "$BLOCKLIST" ]; then
            echo "No blocklist; skipping post-action dup-check."
            exit 0
          fi
          # Find any pilot PR created in the last 10 minutes (this run's output).
          CUTOFF=$(date -u -d '10 minutes ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -v-10M +%Y-%m-%dT%H:%M:%SZ)
          RECENT_PRS=$(gh pr list --label plato-pilot --state open --limit 5 \
            --search "created:>=$CUTOFF" \
            --json number,body)
          # Use process substitution so the while loop runs in the main shell —
          # `exit 1` inside a pipe-to-while runs in a subshell and doesn't fail
          # the step. See PR #88 review feedback.
          FAILED=0
          while read -r pr; do
            NUM=$(echo "$pr" | jq -r '.number')
            BODY=$(echo "$pr" | jq -r '.body')
            LINKED=$(echo "$BODY" | grep -oiE '(fixes|closes|resolves)[[:space:]]+#[0-9]+' | grep -oE '[0-9]+' | sort -u)
            for ISSUE in $LINKED; do
              if echo ",$BLOCKLIST," | grep -q ",$ISSUE,"; then
                echo "::error::PR #$NUM references blocked issue #$ISSUE (already has an open pilot PR). Closing."
                gh pr close "$NUM" --comment "Automatically closed: this PR duplicates an already-open pilot PR for issue #$ISSUE. The pilot's pre-flight blocklist should have prevented this pick."
                FAILED=1
              fi
            done
          done < <(echo "$RECENT_PRS" | jq -c '.[]')
          if [ "$FAILED" -eq 1 ]; then exit 1; fi
          echo "Post-action dup-check passed."

      - name: Auto-escalate looping issues
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: 'false'
        run: |
          # Find ready-for-pilot issues that have ≥2 closed-unmerged pilot PRs.
          # When a loop is detected: relabel ready-for-pilot → needs-info and
          # post a comment asking the reporter to clarify. The dry-run mode
          # (DRY_RUN=true) was used for the first run on 2026-04-20 and
          # produced correct output (would-relabel #60, skip #43 because
          # it's not labeled). Flipped to live after that validation.
          SINCE=$(date -u -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -u -v-30d +%Y-%m-%d)
          CLOSED_PRS=$(gh pr list --label plato-pilot --state closed --limit 50 \
            --search "closed:>=$SINCE" \
            --json number,body,mergedAt)
          # Attribute each closed-unmerged PR to its referenced issues.
          # Flatten ALL matches per PR (not just the first) and drop PRs that
          # reference no issues, so a body with no Fixes #N doesn't pollute
          # the group_by with `null` entries. See PR #88 review feedback.
          ATTEMPTS=$(echo "$CLOSED_PRS" | jq -r '
            [.[] | select(.mergedAt == null) | .body // "" |
              [scan("(?i)(?:fixes|closes|resolves)\\s+#([0-9]+)")[]] | .[]] |
            group_by(.) | map({issue: .[0], count: length}) | .[] |
            select(.count >= 2) | "\(.issue) \(.count)"')
          if [ -z "$ATTEMPTS" ]; then
            echo "No looping issues detected."
            exit 0
          fi
          echo "$ATTEMPTS" | while read -r ISSUE COUNT; do
            LABELS=$(gh issue view "$ISSUE" --json labels --jq '.labels | map(.name) | join(",")' 2>/dev/null || echo "")
            if ! echo ",$LABELS," | grep -q ",ready-for-pilot,"; then
              echo "Issue #$ISSUE has $COUNT closed pilot PRs but is not ready-for-pilot; skip."
              continue
            fi
            if [ "$DRY_RUN" = 'true' ]; then
              echo "[DRY-RUN] Would relabel issue #$ISSUE (ready-for-pilot → needs-info) after $COUNT closed pilot PRs."
            else
              PR_REFS=$(echo "$CLOSED_PRS" | jq -r --arg i "$ISSUE" '
                [.[] | select(.mergedAt == null) |
                  select(.body // "" | test("(?i)(?:fixes|closes|resolves)\\s+#\($i)\\b")) |
                  "#\(.number)"] | join(", ")')
              gh issue edit "$ISSUE" --remove-label ready-for-pilot --add-label needs-info
              gh issue comment "$ISSUE" --body "plato-pilot attempted this $COUNT× (closed PRs: $PR_REFS) without a merge. Re-tagging \`needs-info\` — could you clarify which of those attempts matches what you wanted, or what's missing? Once clarified we'll route it back to the pilot."
              echo "Relabeled issue #$ISSUE."
            fi
          done
