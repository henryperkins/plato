name: issue-intake

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to triage (re-run intake on an existing issue)
        required: true
        type: string

jobs:
  intake:
    # - `opened`: skip bot-authored issues (loop prevention) and issues already
    #   carrying an intake label (idempotency).
    # - `reopened`: always run. A reopen is an explicit signal from the reporter
    #   that the previous classification needs revisiting (either "you closed
    #   this wrongly" or "I replied to needs-info, please re-check"). The
    #   prompt's re-run guard handles the already-labeled case.
    # - `issue_comment` on a `needs-info` issue: a reply may be the answer the
    #   intake agent asked for. Re-run so the prompt's re-run guard can decide
    #   whether to flip to `ready-for-pilot` or leave `needs-info` in place.
    #   Filtered to issues only (not PR comments) and non-bot commenters so
    #   claude[bot]'s own asking comment doesn't re-trigger the workflow.
    # - `workflow_dispatch`: always run — the operator is explicitly asking.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.action == 'reopened' &&
       !contains(github.event.issue.user.login, '[bot]')) ||
      (github.event_name == 'issues' && github.event.action == 'opened' &&
       !contains(github.event.issue.user.login, '[bot]') &&
       !contains(github.event.issue.labels.*.name, 'ready-for-pilot') &&
       !contains(github.event.issue.labels.*.name, 'needs-info')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request == null &&
       contains(github.event.issue.labels.*.name, 'needs-info') &&
       !contains(github.event.comment.user.login, '[bot]'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure intake labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create ready-for-pilot --color 1F883D --description "Triaged: enough info for plato-pilot or a human to act on" 2>/dev/null || true
          gh label create needs-info --color D4C5F9 --description "Intake agent asked the reporter for more details" 2>/dev/null || true
          gh label create needs-decomposition --color FBCA04 --description "Real request, but too broad to act on as one PR — break into smaller issues" 2>/dev/null || true

      - name: Configure AWS credentials (Bedrock OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          aws-region: us-east-2

      - uses: anthropics/claude-code-action@v1
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number || inputs.issue_number }}
        with:
          use_bedrock: "true"
          # `claude` for in-pipeline bot chatter; `github-actions` so the
          # issue-intake-sweep backstop's workflow_dispatch retries (which run
          # as the github-actions[bot] actor) aren't rejected as a non-human
          # actor — otherwise the self-healing sweep is a silent no-op.
          allowed_bots: "claude,github-actions"
          show_full_output: true
          # Haiku is plenty for classification: read issue, decide A/B/C, label, comment.
          # Sonnet's reasoning headroom is wasted here — saves ~3x on per-run cost.
          claude_args: "--allowedTools Bash(*),Read(*),Glob,Grep --max-turns 15 --model us.anthropic.claude-haiku-4-5-20251001-v1:0"
          prompt: |
            You are plato's issue-intake agent triaging issue #${{ github.event.issue.number || inputs.issue_number }}.

            Begin immediately. Do not ask the user for clarification or for the issue
            number — issue #${{ github.event.issue.number || inputs.issue_number }} is
            your assignment. Run the Step 1 commands below as your first action.

            Your job is to prepare new issues so plato-pilot (the daily autonomous
            engineering agent) or a human can act on them without round-tripping for
            basic details.

            ## Context about plato-pilot
            plato-pilot triages open issues every weekday and may open a PR. It works
            well when an issue has:
            - Reproduction steps (URL, what was clicked, which lesson/role)
            - Expected vs. actual behavior stated clearly
            - Any error message, screenshot, or console output if applicable
            - Environment (browser / device, learner vs. admin)

            It struggles with vague reports ("something is broken", "can we make X better").

            ## Step 1: Read context (≤3 turns)
            - `gh issue view ${{ github.event.issue.number || inputs.issue_number }} --json title,body,labels,author,comments` — read the issue that triggered this run
            - Skim CLAUDE.md to understand the project

            **Only work on `${{ github.event.issue.number || inputs.issue_number }}`** — do not scan other issues. The workflow
            fires per-issue; this run's job is one issue.

            ## Re-run guard (reopens, comment replies, and manual dispatches)
            If this run is a **reopen**, a **new comment on a `needs-info`
            issue**, or a **manual dispatch**, the issue may already have
            history. Handle the likely cases:

            - Issue previously closed by the intake agent (outcome C) and now
              reopened, no intake label → the reporter is saying you misread it.
              Treat this like a fresh classification but take the reopen as a strong
              hint that it IS a real plato issue. Prefer outcome A or B; only close
              again (outcome C) if it's clearly still spam/off-topic on a second read.
            - `needs-info` label present, reporter has replied in comments → check the
              comments and pick one of:
              - **Reply answers enough** → remove `needs-info`, add `ready-for-pilot`,
                and post a short confirmation comment ("Got it — tagged ready-for-pilot.").
              - **Reply doesn't fully answer, but the gap is narrow** → leave `needs-info`
                and post **one focused follow-up comment** that names exactly what's
                still missing. Reference what they did say so they know you read it
                ("Thanks — that confirms the navigation level. We still need…"). Max
                2 follow-up questions.
              - **Reply reveals this is an epic / multi-component feature** → switch
                from `needs-info` to `needs-decomposition`, post a comment that names
                the components you see and asks the reporter to split it into separate
                issues (one per component). Pattern: "This is bigger than one PR —
                we see [X], [Y], [Z]. Could you open a separate issue for each so we
                can pick them up one at a time?"
              - **Never** silently leave `needs-info` after a reporter reply. If you
                read it, say something. The reporter is waiting on you.
            - `needs-decomposition` label present, reporter has replied with new
              issues filed → confirm the split looks right, close this umbrella issue
              with a brief comment pointing to the new issues. If they haven't split
              yet, leave the label and don't comment again (the original ask stands).
            - `ready-for-pilot` label present → almost always leave alone unless the
              classification is obviously wrong.

            When switching labels, remove the old one first:
            `gh issue edit ${{ github.event.issue.number || inputs.issue_number }} --remove-label <old-label>` before adding the new.

            ## Step 2: Classify and act (1 pass, idempotent)

            Every non-bot issue gets engaged. Pick one of three outcomes:

            **A. Already actionable** — the issue names something *concrete*. At
            least ONE of these must be present:
            - An exact string / label / copy change (e.g. "change 'Created by' to
              'Updated by' in the Lessons table header")
            - A specific error message, console log, or screenshot that pinpoints
              the problem
            - A concrete page/URL/component AND the specific observed-vs-expected
              behavior ("the Send button in the chat compose bar on iPad Safari
              doesn't respond to taps" — names component, device, and behavior)

            A "clear user-visible request" alone is NOT sufficient. "Updated
            headings needed in admin dashboard" is too vague even if a reporter
            feels strongly — plato-pilot will loop on interpretations. When in
            doubt between A and B, **prefer B**. A false-positive `needs-info`
            is cheap (reporter clarifies); a false-positive `ready-for-pilot`
            fuels pilot loops and wastes review cycles.

            ```
            gh issue edit ${{ github.event.issue.number || inputs.issue_number }} --add-label ready-for-pilot
            gh issue comment ${{ github.event.issue.number || inputs.issue_number }} --body "Thanks — this has enough detail for plato-pilot or a human to pick up. Tagged \`ready-for-pilot\`."
            ```

            **B. Needs info** — genuine but vague report. Vague feedback ("make it
            cooler"), ambiguous feature requests ("add X"), broad enhancement ideas,
            or reports missing specifics all get engaged with focused questions. If
            the issue self-describes as a test ("this is just a test"), still engage —
            ask whether it's a real request or can be closed.

            Post exactly one comment using this template, then label. ONE `gh issue
            comment` call — no retries, no follow-up edits.

            ```
            gh issue comment ${{ github.event.issue.number || inputs.issue_number }} --body "Thanks for opening this. A few details would help us act on it:

            1. <question>
            2. <question>
            3. <question>

            Reply here with what you can share and we'll pick this up."
            gh issue edit ${{ github.event.issue.number || inputs.issue_number }} --add-label needs-info
            ```

            **C. Spam or problematic** — close politely with a brief explanation and
            an invitation to reopen if we misread it. Use this only for:
            - Obvious spam (promotions, link spam, SEO)
            - Content unrelated to plato (wrong project / repository)
            - Abusive, threatening, hateful, or sexually explicit content
            - Clearly malicious / "security research" extortion attempts

            Err on the side of B (needs-info) when unsure. Low-effort or vague reports
            are NOT spam — those go to B.

            ```
            gh issue comment ${{ github.event.issue.number || inputs.issue_number }} --body "Hey, this doesn't look like a plato bug or feature request, so we're closing it. If we got that wrong — if this is a real plato issue we misread — please reopen with a sentence or two about what you were doing in plato and we'll take another look."
            gh issue close ${{ github.event.issue.number || inputs.issue_number }} --reason "not planned"
            ```

            Do not add a label when closing — the closed+comment state is the signal.

            ## Question rules (critical)
            - Ask ONLY for things the reporter can provide. Never ask "which file is
              affected" or "can you check the code" — that's our job, not theirs.
            - Favor: exact steps to reproduce, URL or page, expected vs. actual,
              error message or screenshot, browser + OS, role (learner / admin),
              whether it worked before. For vague feature requests: the specific
              behavior the reporter wants to see, and what problem it solves.
            - Max 3 questions. One focused question beats three vague ones.
            - Don't ask what's already answered in the body.
            - Don't ask for everything on a wishlist; pick the 1–3 most useful to
              unblock triage.

            ## Do not
            - Don't close issues except in outcome C (spam / problematic / off-topic).
            - Don't add labels other than `ready-for-pilot`, `needs-info`, or `needs-decomposition`.
            - Don't engage bot-authored issues — the job's `if:` condition already
              filters these out.
            - Don't lecture or offer design opinions. This is intake, not review.
            - Don't `@` anyone.
            - Don't look at other issues; stick to `${{ github.event.issue.number || inputs.issue_number }}`.
