name: Code Review

on:
  pull_request:
    # `ready_for_review` fires when a Draft PR is flipped to Ready — that's
    # the moment we want to invoke the auto-reviewer for the first time on a
    # PR that was iterated as a draft. `synchronize` covers further pushes
    # once the PR is Ready (we gate on draft inside the job). `opened`
    # covers PRs opened directly as Ready.
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/dependabot.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (current branch must be the PR branch)'
        required: true
        type: string
  # NOTE: no `issue_comment` trigger. `@claude` mentions on PRs are handled by
  # the hosted Claude GitHub App (Max-plan-included, no Anthropic API spend),
  # while this workflow remains the canonical reviewer on every commit using
  # the project-specific prompt below. To rerun on demand without a new commit:
  #   gh workflow run code-review.yml --ref <branch> -f pr_number=<n>

jobs:
  review:
    # Skip when:
    # - The PR is still Draft (the documented contributor flow opens PRs as
    #   Draft for collaborative iteration; we only want to invoke the
    #   reviewer once the PR is genuinely ready). `workflow_dispatch` and
    #   `ready_for_review` events bypass this check so the maintainer can
    #   force a review and the Draft → Ready transition still triggers.
    # - The PR is from dependabot (mechanical bumps; the Lint job gates).
    if: |
      (github.event_name == 'workflow_dispatch' ||
        github.event.action == 'ready_for_review' ||
        github.event.pull_request.draft != true) &&
      (github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.user.login != 'dependabot[bot]')
    runs-on: ubuntu-latest
    # Wall-clock budget replaces the previous --max-turns 30 cap. Turn counts
    # were a fragile proxy: a thorough review that read several modified files
    # plus ran the test suite would routinely hit 30 mid-investigation and exit
    # without ever calling `gh pr review`, leaving the verify step to fail the
    # job. timeout-minutes bounds Bedrock + Actions cost on actual elapsed
    # time, which is the constraint we care about.
    timeout-minutes: 12
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve PR + head sha
        # Normalises PR_NUMBER + HEAD_SHA + BASE_REF across pull_request (auto)
        # and workflow_dispatch (manual rerun) triggers so the rest of the job
        # doesn't have to branch on event_name.
        id: ctx
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
            META=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER")
            HEAD_SHA=$(echo "$META" | jq -r .head.sha)
            BASE_REF=$(echo "$META" | jq -r .base.ref)
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            BASE_REF="${{ github.event.pull_request.base.ref }}"
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
      - name: Skip if a claude review already exists for this commit
        id: guard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
        run: |
          # Per-commit idempotency. If a claude[bot] review already exists
          # for the current HEAD sha, don't post another one. New commits
          # (different sha) still get reviewed as normal.
          EXISTING=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            --jq "[.[] | select(.user.login==\"claude[bot]\") | select(.commit_id==\"$HEAD_SHA\")] | length")
          if [ "${EXISTING:-0}" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "A claude[bot] review already exists for $HEAD_SHA; skipping."
          fi
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.skip != 'true'
        with:
          node-version: 20
      - name: Build review context
        # Pre-fetches everything the reviewer needs into a single file so the
        # agent doesn't burn turns rediscovering context with shell tools.
        # Includes: PR metadata, diff vs. base, list of changed files, full
        # source of each changed file (size-capped), and the npm test output.
        # Skips binary / very-large files with a notice so token budget isn't
        # blown on lockfiles or generated bundles.
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          BASE_REF: ${{ steps.ctx.outputs.base_ref }}
          MAX_LINES_PER_FILE: '800'
          MAX_BYTES_PER_FILE: '120000'
        run: |
          set -euo pipefail
          CTX=/tmp/review-context.md
          : > "$CTX"

          # ── PR metadata ────────────────────────────────────────────────
          {
            echo "# Review context"
            echo
            echo "## PR metadata"
            gh pr view "$PR_NUMBER" --json number,title,author,body,baseRefName,headRefName \
              --jq '"PR #\(.number): \(.title)\nAuthor: \(.author.login)\nBase: \(.baseRefName) ← Head: \(.headRefName)\n\n--- PR body ---\n\(.body // "(no body)")"'
            echo
          } >> "$CTX"

          # ── Test output (run once here so the agent doesn't spend turns) ─
          {
            echo "## Test output (cd server && npm ci && npm test)"
            echo '```'
            (cd server && npm ci --silent && npm test) 2>&1 | tail -120 || echo "(tests failed — see above)"
            echo '```'
            echo
          } >> "$CTX"

          # ── Diff against base ──────────────────────────────────────────
          git fetch origin "$BASE_REF" --depth=200 >/dev/null 2>&1 || true
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD)
          {
            echo "## Changed files (vs. $BASE_REF)"
            echo '```'
            git diff --name-status "$MERGE_BASE"...HEAD
            echo '```'
            echo
            echo "## Full diff (vs. $BASE_REF)"
            echo '```diff'
            git diff "$MERGE_BASE"...HEAD
            echo '```'
            echo
          } >> "$CTX"

          # ── Full source of each changed (still-present) file ───────────
          {
            echo "## Full source of changed files"
            echo
            git diff --name-only --diff-filter=AM "$MERGE_BASE"...HEAD | while read -r f; do
              [ -f "$f" ] || continue
              # Skip binaries.
              if file --mime "$f" | grep -qE 'charset=binary'; then
                echo "### \`$f\`"
                echo "(binary — skipped)"
                echo
                continue
              fi
              SIZE=$(wc -c <"$f")
              LINES=$(wc -l <"$f")
              echo "### \`$f\` ($LINES lines, $SIZE bytes)"
              if [ "$SIZE" -gt "$MAX_BYTES_PER_FILE" ] || [ "$LINES" -gt "$MAX_LINES_PER_FILE" ]; then
                echo "(file exceeds context cap — showing first $MAX_LINES_PER_FILE lines)"
                echo '```'
                head -n "$MAX_LINES_PER_FILE" "$f"
                echo '```'
              else
                echo '```'
                cat "$f"
                echo '```'
              fi
              echo
            done
          } >> "$CTX"

          echo "Wrote review context: $(wc -l <"$CTX") lines, $(wc -c <"$CTX") bytes"
      - name: Configure AWS credentials (Bedrock OIDC)
        if: steps.guard.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BEDROCK_ROLE_ARN }}
          aws-region: us-east-2
      - uses: anthropics/claude-code-action@v1
        if: steps.guard.outputs.skip != 'true'
        env:
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
        with:
          use_bedrock: "true"
          allowed_bots: "claude"
          # display_report intentionally disabled: it auto-posts an aggregated
          # review from buffered inline annotations at end of session, which
          # races with the explicit `gh pr review` call in the prompt and
          # double-submits. See PR #73 (2026-04-17) where two reviews were
          # posted 6s apart with slightly different bodies.
          #
          # No --max-turns: timeout-minutes on the job is the budget. Turn
          # caps were dropping reviews mid-investigation; wall-clock is the
          # constraint we actually pay for.
          claude_args: "--allowedTools Bash(*),Read(*),Glob,Grep --model us.anthropic.claude-sonnet-4-5-20250929-v1:0"
          prompt: |
            You are a skeptical code reviewer. Your job is to find real problems the author missed.

            **Start by reading `/tmp/review-context.md`.** It contains the PR metadata,
            full diff, the full source of every changed file, and the `npm test` output.
            That is your primary context — don't burn time re-running `gh pr diff`,
            `git diff`, or `npm test`. Use shell tools only when you need to look at a
            file that *isn't* in the context dump.

            Then read CLAUDE.md and REVIEW.md (if present) for project conventions.

            **plato is live.** learn.ai-leaders.org has active users, many mid-lesson
            as you review. Every merge to `main` auto-deploys to prod. Your review is
            the last human-free checkpoint before real sessions see this code.

            ## What to look for

            ### Must flag (blocking)
            - **Bugs**: edge cases, off-by-one errors, null/undefined paths, race conditions
            - **Regressions**: does this change break any existing behavior?
            - **Security**: XSS, injection, leaked secrets, auth bypass
            - **Accessibility**: missing aria labels, keyboard traps, broken screen reader support
            - **Missing tests**: server route/lib changes without test coverage
            - **Live-user impact** (see below — call out even when other checks pass)

            ### Live-user impact — call out explicitly in every review
            Because merges auto-deploy to prod, always surface changes that could
            affect active learners. Flag any of the following, either as blocking
            (when the risk is real and unmitigated) or as a user-impact note on
            an otherwise-clean review:

            - Changes to in-flight lesson state or storage: `client/js/orchestrator.js`, `lessonOwner.js`, `storage.js`, `client/src/lib/lessonEngine.js`
            - Streaming chat path: `server/src/routes/ai.js`, `ai-provider.js` — bugs drop active conversations
            - Auth / JWT / refresh tokens (`server/src/routes/auth.js`, token TTLs, localStorage keys) — a bug logs everyone out
            - DynamoDB schema, sync-data format, or data migrations — forward/backward compatibility
            - `server/template.yaml` / SAM infra — deploy-breaking changes
            - Prompt files under `client/prompts/*.md` — live coaching behavior changes on next Lambda cold start
            - Changes to microlearning constants (`client/src/lib/constants.js`, `server/src/lib/lesson-limits.js`)

            When the PR is a plato-pilot PR, check the **User impact** line in the PR body
            against the actual diff. If the author said "low" but the diff touches a
            higher-risk surface, that's a must-flag mislabel.

            ### Should flag (non-blocking)
            - Logic that's correct but fragile (will break on the next change)
            - Inconsistency with patterns used elsewhere in the codebase
            - CLAUDE.md conventions not followed

            ### Do NOT flag
            - Style preferences (formatting, naming, semicolons)
            - "You could also do X" suggestions with no concrete benefit
            - Things that are already correct

            ## Output
            Submit exactly ONE review via `gh pr review`, then stop. Do not retry,
            update, amend, or supplement it with extra `gh pr review`, `gh pr comment`,
            or `gh api` calls — if the first call succeeded you are done.

            **Every review body must end with a one-line "User impact" summary**, e.g.
            `User impact: none — admin-only UI copy change.` or
            `User impact: medium — streaming route error handling changed; confirmed tests cover the new path.`
            This gives the maintainer a consistent final signal before merge.

            Pick one outcome:
            - Tests fail (see context dump) → `gh pr review $PR_NUMBER --request-changes --body "Tests fail: ..."`
            - Blocking issues → `gh pr review $PR_NUMBER --request-changes --body "..."` with file:line references
            - Clean → `gh pr review $PR_NUMBER --approve --body "Tests pass. No bugs, security, or accessibility issues found.\n\nUser impact: ..."`

            Be direct. Short is better than thorough.
      - name: Verify claude[bot] review was posted
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          HEAD_SHA: ${{ steps.ctx.outputs.head_sha }}
        run: |
          # The SDK can exit successfully without calling `gh pr review`,
          # leaving the PR unreviewed and the required status check green.
          # Fail loudly instead so the workflow can be re-triggered.
          COUNT=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews" \
            --jq "[.[] | select(.user.login==\"claude[bot]\") | select(.commit_id==\"$HEAD_SHA\")] | length")
          if [ "${COUNT:-0}" -eq 0 ]; then
            echo "::error::No claude[bot] review posted for $HEAD_SHA. Re-run the workflow with: gh workflow run code-review.yml --ref <branch>"
            exit 1
          fi
          echo "claude[bot] review exists for $HEAD_SHA"
